name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      # Optional: if you need MongoDB for tests
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Build project
        run: npm run build
        env:
          # Provide dummy values for required env vars during build
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-test-secret-key-change-in-production' }}
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'mongodb://mongodb:27017/nairobimart-test' }}
          # Add other required env vars as needed
          NEXT_PUBLIC_GA_MEASUREMENT_ID: G-D1T6N0H9XE

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm test
        env:
          CI: true
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000
          # Provide test database URL if needed
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'mongodb://mongodb:27017/nairobimart-test' }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test videos (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos
          path: test-results/
          retention-days: 7
