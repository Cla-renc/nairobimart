name: Win-back Campaign - Weekly

on:
  schedule:
    - cron: '0 9 * * 1' # runs weekly on Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  run-winback:
    runs-on: ubuntu-latest
    steps:
      - name: Call win-back cron endpoint
        env:
          BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$BACKEND_URL" ]; then echo "RENDER_BACKEND_URL secret is not set"; exit 1; fi
          echo "Calling $BACKEND_URL/api/cron/winback"
          http_status=$(curl -sS -o /tmp/winback_response.txt -w "%{http_code}" -X GET "$BACKEND_URL/api/cron/winback" -H "Authorization: Bearer $CRON_SECRET") || true
          echo "HTTP status: $http_status"
          cat /tmp/winback_response.txt || true
          if [ "$http_status" -ge 400 ]; then echo "Win-back cron call failed"; exit 1; fi
